<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completing Zoom Sign-In</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f7f5f1;
      color: #1f2933;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f5f1;
    }

    main {
      max-width: 28rem;
      padding: 2rem;
      border: 1px solid #e3ddd2;
      border-radius: 1rem;
      background: #ffffff;
      box-shadow: 0 20px 40px rgba(18, 37, 63, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.4rem;
    }

    p {
      margin: 0;
      line-height: 1.5;
      color: #52606d;
    }
  </style>
</head>
<body>
  <main>
    <h1>Completing Zoom sign-in</h1>
    <p>This window should close automatically once authentication finishes.</p>
  </main>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var payload = {
          type: "tp-zoom-auth-result",
          code: params.get("code") || "",
          state: params.get("state") || "",
          error: params.get("error") || "",
          errorDescription: params.get("error_description") || "",
        };
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, window.location.origin);
        } else {
          try {
            sessionStorage.setItem("tp.zoomAuthResult", JSON.stringify(payload));
          } catch (e) { /* ignore */ }
        }
      } catch (e) {
        /* swallow */
      }
      window.setTimeout(function () { window.close(); }, 150);
    }());
  </script>
</body>
</html>
