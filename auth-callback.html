<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completing Sign-In</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f7f5f1;
      color: #1f2933;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f5f1;
    }

    main {
      max-width: 28rem;
      padding: 2rem;
      border: 1px solid #e3ddd2;
      border-radius: 1rem;
      background: #ffffff;
      box-shadow: 0 20px 40px rgba(18, 37, 63, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.4rem;
    }

    p {
      margin: 0;
      line-height: 1.5;
      color: #52606d;
    }
  </style>
</head>
<body>
  <main>
    <h1>Completing Microsoft 365 sign-in</h1>
    <p>This window should close automatically once authentication finishes.</p>
  </main>
</body>
</html>
